<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J. Cillizza Art Shows 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media print {
            body {
                margin: 0;
                padding: 0;
                background: white;
            }
            .flyer {
                box-shadow: none;
            }
        }

        body {
            font-family: Georgia, serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .flyer {
            width: 8.5in;
            height: 11in;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #0b0b0b;
            color: #e8b84b;
            padding: 0.25in 0.3in;
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 0.05in;
        }

        .header p {
            font-size: 0.6em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
        }

        .gallery {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0.12in;
            padding: 0.2in;
            background: #fafafa;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Feature the Mickey in a larger spot */
        .gallery-item:nth-child(4) {
            grid-column: 2;
            grid-row: 1 / 3;
        }

        .footer {
            background: #0b0b0b;
            color: white;
            padding: 0.2in 0.3in;
            z-index: 10;
        }

        .show-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.2in;
            margin-bottom: 0.1in;
        }

        .show {
            border-left: 3px solid #e8b84b;
            padding-left: 0.1in;
        }

        .show-city {
            font-size: 0.85em;
            font-weight: 700;
            color: #e8b84b;
            text-transform: uppercase;
        }

        .show-date {
            font-size: 0.7em;
            color: #ccc;
        }

        .contact-info {
            text-align: center;
            padding-top: 0.1in;
            border-top: 1px solid #333;
            font-size: 0.7em;
        }

        .contact-info a {
            color: #e8b84b;
            text-decoration: none;
            font-weight: 700;
        }

        .corner-contact {
            position: absolute;
            bottom: 0.15in;
            right: 0.15in;
            background: #0b0b0b;
            color: #e8b84b;
            padding: 0.1in 0.15in;
            font-size: 0.75em;
            font-weight: 700;
            text-align: right;
            z-index: 20;
        }

        .corner-contact a {
            color: #e8b84b;
            text-decoration: none;
        }

        @media (max-width: 900px) {
            .flyer {
                width: 100%;
                height: auto;
            }

            .gallery {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto;
            }

            .gallery-item:nth-child(4) {
                grid-column: 1 / 3;
                grid-row: auto;
            }

            .header h1 {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <div class="flyer">
        <div class="header">
            <h1>J. CILLIZZA</h1>
            <p>Art & Abstraction</p>
        </div>

        <div class="gallery">
            <div class="gallery-item">
                <img src="Screenshot_2026-05-08_at_5_16_41_AM.png" alt="Chromatic Overflow">
            </div>

            <div class="gallery-item">
                <img src="Screenshot_2026-05-08_at_5_17_42_AM.png" alt="Birch Grove Rebellion">
            </div>

            <div class="gallery-item">
                <img src="Screenshot_2026-05-08_at_5_17_58_AM.png" alt="Geometric Paradox">
            </div>

            <div class="gallery-item">
                <img src="Screenshot_2026-05-08_at_5_18_10_AM.png" alt="Mickey's LV Fever Dream">
            </div>

            <div class="gallery-item">
                <img src="Screenshot_2026-05-08_at_5_18_26_AM.png" alt="Emotional Weather">
            </div>

            <div class="gallery-item">
                <img src="Screenshot_2026-05-08_at_5_18_46_AM.png" alt="Hero Stack">
            </div>
        </div>

        <div class="corner-contact">
            Follow<br>
            <a href="https://instagram.com/jtc3designs" target="_blank">@jtc3designs</a>
        </div>

        <div class="footer">
            <div class="show-info">
                <div class="show">
                    <div class="show-city">Hartford</div>
                    <div class="show-date">June 13, 2026</div>
                </div>
                <div class="show">
                    <div class="show-city">Boston</div>
                    <div class="show-date">July 2026</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (new URLSearchParams(window.location.search).get('print') === '1') {
            window.print();
        }
    </script>
</body>
</html>
